name: Website feature request
description: Suggest a small improvement for the website.
title: "[Website Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: Thanks for sharing an idea for the Pingo website.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What would this improve?
      placeholder: I often need to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should the website do?
      placeholder: It would be helpful if...
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add examples, screenshots, or related details.