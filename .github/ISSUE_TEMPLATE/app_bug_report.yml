name: App bug report
description: Report something that is not working in the macOS app.
title: "[App Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Pingo.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
      placeholder: Pingo should... but it...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Open Pingo
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Pingo Version
      placeholder: v0.1.0
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS Version
      placeholder: macOS 26.x
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add screenshots, recordings, request details with secrets removed, network details, or anything else that helps.
